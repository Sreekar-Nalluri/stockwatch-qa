<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111318;
      --border:    #1e2128;
      --muted:     #3a3f4a;
      --text:      #e8eaf0;
      --dim:       #6b7280;
      --green:     #00e5a0;
      --red:       #ff4d6a;
      --amber:     #f5a623;
      --blue:      #4fa3ff;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 24px;
    }

    /* ---------- HEADER ---------- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
    }
    .logo span { color: var(--dim); font-weight: 400; }

    .market-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.open  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .status-dot.closed{ background: var(--red); }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* ---------- API KEY BANNER ---------- */
    #key-banner {
      background: #1a1400;
      border: 1px solid #3a2a00;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    #key-banner input {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid var(--muted);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
    }
    #key-banner input:focus { border-color: var(--amber); }
    #key-banner button {
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #key-banner label { color: var(--amber); font-family: var(--mono); font-size: 11px; white-space: nowrap; }

    /* ---------- SEARCH ---------- */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .search-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .search-bar input:focus { border-color: var(--blue); }
    .search-bar input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
    .search-bar button {
      background: var(--blue);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.06em;
    }
    .search-bar button:hover { opacity: .85; }

    /* ---------- DEFAULT SYMBOLS ---------- */
    .quick-symbols {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .sym-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 12px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all .15s;
    }
    .sym-btn:hover, .sym-btn.active {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(79,163,255,.07);
    }

    /* ---------- CARDS GRID ---------- */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .stock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .stock-card:hover { border-color: var(--muted); }
    .stock-card.up   { border-left: 3px solid var(--green); }
    .stock-card.down { border-left: 3px solid var(--red); }
    .stock-card.flat { border-left: 3px solid var(--muted); }

    .card-symbol {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 2px;
    }
    .card-label {
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 14px;
    }

    .card-price {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .card-price.up   { color: var(--green); }
    .card-price.down { color: var(--red); }
    .card-price.flat { color: var(--text); }

    .card-change {
      font-family: var(--mono);
      font-size: 12px;
      margin-bottom: 14px;
    }
    .card-change.up   { color: var(--green); }
    .card-change.down { color: var(--red); }
    .card-change.flat { color: var(--dim); }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .meta-item { }
    .meta-key   { font-size: 10px; color: var(--dim); font-family: var(--mono); letter-spacing: 0.06em; margin-bottom: 2px; }
    .meta-value { font-size: 13px; font-family: var(--mono); color: var(--text); }

    .card-timestamp {
      position: absolute;
      top: 14px; right: 14px;
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .loading-shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      height: 24px;
      width: 80%;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ---------- DETAIL TABLE ---------- */
    #detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      display: none;
    }
    #detail-section h2 {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 13px;
    }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 500;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .td-up   { color: var(--green); }
    .td-down { color: var(--red); }
    .td-sym  { font-weight: 600; letter-spacing: 0.08em; }

    /* ---------- ERROR ---------- */
    .error-msg {
      background: rgba(255,77,106,.08);
      border: 1px solid rgba(255,77,106,.25);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--red);
      font-family: var(--mono);
      margin-bottom: 12px;
      display: none;
    }

    /* ---------- LAST REFRESH ---------- */
    #refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }
    #refresh-bar button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
    }
    #refresh-bar button:hover { border-color: var(--blue); color: var(--blue); }
  </style>
</head>
<body>

<header>
  <div class="logo">STOCK MARKET DATA <span>// live feed</span></div>
  <div class="market-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">checking...</span>
  </div>
</header>

<!-- API Key input -->
<div id="key-banner">
  <label>FINNHUB KEY</label>
  <input type="text" id="api-key-input" placeholder="Paste your Finnhub API key here..." autocomplete="off"/>
  <button onclick="saveKey()">LOAD DATA</button>
</div>

<div class="error-msg" id="error-msg"></div>

<!-- Search -->
<div class="search-bar">
  <input type="text" id="symbol-input" placeholder="Enter symbol e.g. TSLA, MSFT" maxlength="10"/>
  <button onclick="addSymbol()">ADD</button>
</div>

<!-- Quick symbols -->
<div class="quick-symbols" id="quick-symbols">
  <span class="sym-btn" onclick="addSymbol('AAPL')">AAPL</span>
  <span class="sym-btn" onclick="addSymbol('MSFT')">MSFT</span>
  <span class="sym-btn" onclick="addSymbol('GOOGL')">GOOGL</span>
  <span class="sym-btn" onclick="addSymbol('AMZN')">AMZN</span>
  <span class="sym-btn" onclick="addSymbol('TSLA')">TSLA</span>
  <span class="sym-btn" onclick="addSymbol('NVDA')">NVDA</span>
  <span class="sym-btn" onclick="addSymbol('META')">META</span>
</div>

<div id="refresh-bar">
  <span>Last updated: <span id="last-updated">—</span></span>
  <button onclick="refreshAll()">↻ REFRESH</button>
</div>

<!-- Stock cards -->
<div id="cards-grid"></div>

<!-- Detail table -->
<div id="detail-section">
  <h2>// All Loaded Symbols</h2>
  <table>
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Current</th>
        <th>Open</th>
        <th>High</th>
        <th>Low</th>
        <th>Prev Close</th>
        <th>Change %</th>
        <th>Fetched At</th>
      </tr>
    </thead>
    <tbody id="detail-tbody"></tbody>
  </table>
</div>

<script>
  const FINNHUB_BASE = 'https://finnhub.io/api/v1';
  let API_KEY = localStorage.getItem('finnhub_key') || '';
  let stockData = {};     // symbol -> api response
  let loadedSymbols = []; // order preserved

  // Pre-fill key input if saved
  if (API_KEY) document.getElementById('api-key-input').value = API_KEY;

  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) return showError('Please enter a valid API key.');
    API_KEY = val;
    localStorage.setItem('finnhub_key', API_KEY);
    clearError();
    // Auto-load default symbols
    ['AAPL','MSFT','GOOGL'].forEach(s => addSymbol(s));
    checkMarketStatus();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  async function fetchQuote(symbol) {
    const url = `${FINNHUB_BASE}/quote?symbol=${symbol}&token=${API_KEY}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  async function addSymbol(sym) {
    const input = document.getElementById('symbol-input');
    const symbol = (sym || input.value.trim()).toUpperCase();
    if (!symbol) return;
    if (!API_KEY) return showError('Enter your Finnhub API key first.');
    if (loadedSymbols.includes(symbol)) {
      refreshSymbol(symbol);
      return;
    }
    input.value = '';
    clearError();

    // Create placeholder card
    loadedSymbols.push(symbol);
    renderPlaceholderCard(symbol);

    try {
      const data = await fetchQuote(symbol);
      if (data.c === 0 && data.h === 0) {
        showError(`Symbol "${symbol}" not found or market closed — price returned 0.`);
        removeCard(symbol);
        loadedSymbols = loadedSymbols.filter(s => s !== symbol);
        return;
      }
      stockData[symbol] = { ...data, fetchedAt: new Date() };
      renderCard(symbol);
      renderDetailTable();
      updateLastUpdated();
    } catch(e) {
      showError(`Failed to fetch ${symbol}: ${e.message}`);
      removeCard(symbol);
      loadedSymbols = loadedSymbols.filter(s => s !== symbol);
    }
  }

  async function refreshSymbol(symbol) {
    try {
      const data = await fetchQuote(symbol);
      stockData[symbol] = { ...data, fetchedAt: new Date() };
      renderCard(symbol);
      renderDetailTable();
      updateLastUpdated();
    } catch(e) { /* silent */ }
  }

  async function refreshAll() {
    for (const sym of loadedSymbols) await refreshSymbol(sym);
  }

  function removeCard(symbol) {
    const el = document.getElementById(`card-${symbol}`);
    if (el) el.remove();
  }

  function changeDir(c, pc) {
    if (c > pc) return 'up';
    if (c < pc) return 'down';
    return 'flat';
  }

  function fmtChange(c, pc) {
    const abs = (c - pc).toFixed(2);
    const pct = pc !== 0 ? ((c - pc) / pc * 100).toFixed(2) : '0.00';
    const sign = c >= pc ? '+' : '';
    return `${sign}${abs} (${sign}${pct}%)`;
  }

  function renderPlaceholderCard(symbol) {
    const grid = document.getElementById('cards-grid');
    const div = document.createElement('div');
    div.className = 'stock-card';
    div.id = `card-${symbol}`;
    div.innerHTML = `
      <div class="card-symbol" data-testid="symbol">${symbol}</div>
      <div class="card-label">loading...</div>
      <div class="loading-shimmer" style="margin-bottom:8px"></div>
      <div class="loading-shimmer" style="width:50%;height:14px"></div>`;
    grid.appendChild(div);
  }

  function renderCard(symbol) {
    const d = stockData[symbol];
    const dir = changeDir(d.c, d.pc);
    const chg = fmtChange(d.c, d.pc);
    const ts  = d.fetchedAt.toLocaleTimeString();

    const el = document.getElementById(`card-${symbol}`);
    if (!el) return;
    el.className = `stock-card ${dir}`;
    el.innerHTML = `
      <div class="card-timestamp" data-testid="timestamp">${ts}</div>
      <div class="card-symbol" data-testid="symbol">${symbol}</div>
      <div class="card-label">NYSE / NASDAQ</div>
      <div class="card-price ${dir}" data-testid="current-price">$${d.c.toFixed(2)}</div>
      <div class="card-change ${dir}" data-testid="price-change">${dir === 'up' ? '▲' : dir === 'down' ? '▼' : '—'} ${chg}</div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-key">OPEN</div>
          <div class="meta-value" data-testid="open-price">$${d.o.toFixed(2)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">PREV CLOSE</div>
          <div class="meta-value" data-testid="prev-close">$${d.pc.toFixed(2)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">HIGH</div>
          <div class="meta-value" data-testid="day-high">$${d.h.toFixed(2)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">LOW</div>
          <div class="meta-value" data-testid="day-low">$${d.l.toFixed(2)}</div>
        </div>
      </div>`;
  }

  function renderDetailTable() {
    const tbody = document.getElementById('detail-tbody');
    tbody.innerHTML = '';
    for (const sym of loadedSymbols) {
      const d = stockData[sym];
      if (!d) continue;
      const dir = changeDir(d.c, d.pc);
      const pct = d.pc !== 0 ? ((d.c - d.pc) / d.pc * 100).toFixed(2) : '0.00';
      const sign = d.c >= d.pc ? '+' : '';
      const tr = document.createElement('tr');
      tr.dataset.testid = `row-${sym}`;
      tr.innerHTML = `
        <td class="td-sym">${sym}</td>
        <td data-testid="table-current-${sym}">$${d.c.toFixed(2)}</td>
        <td>$${d.o.toFixed(2)}</td>
        <td>$${d.h.toFixed(2)}</td>
        <td>$${d.l.toFixed(2)}</td>
        <td>$${d.pc.toFixed(2)}</td>
        <td class="${dir === 'up' ? 'td-up' : dir === 'down' ? 'td-down' : ''}"
            data-testid="table-change-${sym}">${sign}${pct}%</td>
        <td>${d.fetchedAt.toLocaleTimeString()}</td>`;
      tbody.appendChild(tr);
    }
    document.getElementById('detail-section').style.display = 'block';
  }

  function updateLastUpdated() {
    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
  }

  async function checkMarketStatus() {
    if (!API_KEY) return;
    try {
      const resp = await fetch(`${FINNHUB_BASE}/stock/market-status?exchange=US&token=${API_KEY}`);
      const data = await resp.json();
      const dot  = document.getElementById('status-dot');
      const txt  = document.getElementById('status-text');
      if (data.isOpen) {
        dot.className = 'status-dot open';
        txt.textContent = 'MARKET OPEN';
      } else {
        dot.className = 'status-dot closed';
        txt.textContent = 'MARKET CLOSED';
      }
    } catch(e) { /* silent */ }
  }

  // Auto-refresh every 30 seconds if key already present
  if (API_KEY) {
    checkMarketStatus();
    setInterval(refreshAll, 30000);
  }
</script>
</body>
</html>
