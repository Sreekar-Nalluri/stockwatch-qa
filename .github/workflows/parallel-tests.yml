name: Parallel Tests
on:
  pull_request:
    branches: [main]
jobs:
  run_tests:
    name: Test on ${{ matrix.os }}
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Python version
        id: python-version
        run: echo "version=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.python-version.outputs.version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Ensure browsers are installed
        run: python -m playwright install --with-deps

      - name: Run playwright parallel tests
        run:  pytest -n 2 --dist=loadfile -m githubactions -v --browser-channel=chrome

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: test-results
            path: |
              test-results/screenshots/
            retention-days: 3

env:
  TEST_ENV: 'qa'
  FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}